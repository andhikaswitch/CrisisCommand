services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    # ROCM: on the MI300X droplet, expose the GPU to the container:
    #   devices: [/dev/kfd, /dev/dri]  + group_add: [video]
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
