# SPA static serving + reverse proxy to the backend (same-origin for the
# browser, so REST and WebSocket both work without CORS or a build-time URL).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets + SPA fallback (one screen, no router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST -> backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;   # long simulations
    }

    # WebSocket -> backend (Upgrade headers required)
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
